<!-- FILE: views/informasi.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Informasi & Layanan PLASMA | BEM KBMFKG UMI</title>
    
    <meta name="description" content="Akses cepat untuk program kerja, kalender kegiatan, galeri dokumentasi, dan layanan PLASMA BEM KBMFKG UMI.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://bemkbmfkgumi.com/informasi">
    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <%- include('partials/header.html') %>
    <main class="container" style="padding-top: 40px; min-height: 80vh; padding-bottom: 80px;">
        
        <div class="reveal" style="text-align: center; margin-bottom: 40px;">
            <div class="clay-badge" style="margin-bottom: 15px;">LAYANAN MAHASISWA</div>
            <h1 style="font-size: 3rem; font-weight: 900;">Pusat <span style="color: var(--accent-neon);">Informasi</span></h1>
        </div>

        <nav class="tab-nav reveal" id="tabNavMenu" style="transition-delay: 0.1s;">
            <button class="tab-btn active" onclick="switchTab('proker')">Program Kerja</button>
            <button class="tab-btn" onclick="switchTab('kalender')">Kalender Proker</button>
            <button class="tab-btn" onclick="switchTab('galeri')">Dokumentasi</button>
            <button class="tab-btn" onclick="switchTab('plasma')">PLASMA (Aspirasi)</button>
        </nav>

        <!-- TAB 1: PROKER -->
        <section id="proker" class="tab-content active" style="max-width: 900px; margin: 0 auto;">
            <div id="prokerContainer"><div style="text-align:center;">Mensinkronisasi data program kerja...</div></div>
        </section>

        <!-- TAB 2: KALENDER & PROKER DETAIL -->
        <section id="kalender" class="tab-content">
            <div class="calendar-wrapper">
                <div class="glass-card" style="padding: 30px; border-top: 4px solid var(--accent-neon);">
                    <div class="calendar-header" style="margin-bottom: 30px;">
                        <button class="action-btn" onclick="gantiBulan(-1)" style="font-size: 1.2rem; padding: 5px 15px;">&larr;</button>
                        <span id="namaBulanTahun" style="font-size: 1.5rem; letter-spacing: 2px;">JULI 2026</span>
                        <button class="action-btn" onclick="gantiBulan(1)" style="font-size: 1.2rem; padding: 5px 15px;">&rarr;</button>
                    </div>
                    <div class="calendar-grid" id="calGrid" style="gap: 15px;"></div>
                </div>
                
                <div class="agenda-list" style="background: rgba(10, 25, 40, 0.6); padding: 30px; border-top: 4px solid var(--accent-neon);">
                    <div style="font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;" id="agendaSubtitle">DAFTAR AGENDA BULAN INI</div>
                    <h3 style="border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px; font-size: 1.5rem;" id="agendaTglFormat">
                        Semua Agenda
                    </h3>
                    <div id="agendaContent">
                        <div style="text-align:center;">Memuat agenda...</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- TAB 3: DOKUMENTASI (GALERI) -->
        <section id="galeri" class="tab-content">
            <div class="gallery-grid" id="galleryContainer"></div>
        </section>

        <!-- TAB 4: PLASMA (ASPIRASI) -->
        <section id="plasma" class="tab-content">
            <div class="glass-card" style="max-width: 700px; margin: 0 auto; border-top: 3px solid var(--accent-neon);">
                <h2 style="color: var(--accent-neon); text-align: center; margin-bottom: 30px;">P.L.A.S.M.A</h2>
                <form id="plasmaForm">
                    <label style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; display: block; font-weight: bold;">Judul Aspirasi <span style="color:#ef4444">*</span></label>
                    <input type="text" id="judul" class="neo-input" placeholder="Tuliskan judul singkat aspirasi Anda..." required>
            
                    <label style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; display: block; font-weight: bold;">Kategori Aspirasi <span style="color:#ef4444">*</span></label>
                    <select id="kategori" class="neo-input" required>
                        <option value="" disabled selected>Pilih Kategori</option>
                        <option value="Akademik">Akademik</option>
                        <option value="Fasilitas Kampus">Fasilitas Kampus</option>
                        <option value="Keuangan/UKT">Keuangan/UKT</option>
                        <option value="Organisasi">Organisasi</option>
                        <option value="Pelayanan Kampus">Pelayanan Kampus</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
            
                    <label style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; display: block; font-weight: bold;">Jenis Aspirasi <span style="color:#ef4444">*</span></label>
                    <div style="margin-bottom: 20px; display:flex; gap:10px; flex-wrap: wrap;">
                        <label class="clay-badge"><input type="radio" name="jenis" value="Saran" checked> Saran</label>
                        <label class="clay-badge"><input type="radio" name="jenis" value="Pengaduan"> Pengaduan</label>
                        <label class="clay-badge"><input type="radio" name="jenis" value="Kritik"> Kritik</label>
                        <label class="clay-badge"><input type="radio" name="jenis" value="Permintaan Informasi"> Permintaan Info</label>
                    </div>
            
                    <label style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; display: block; font-weight: bold;">Isi Aspirasi <span style="color:#ef4444">*</span></label>
                    <textarea id="isi" class="neo-input" rows="5" placeholder="Ceritakan detail aspirasi Anda di sini..." required></textarea>
            
                    <label style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; display: block; font-weight: bold;">Bukti Pendukung <span style="color:var(--text-muted); font-weight:normal;">(Opsional - JPG/PNG/PDF)</span></label>
                    <input type="file" id="bukti" class="neo-input" accept="image/*,.pdf" style="padding: 10px; color: var(--text-muted);">
            
                    <div style="display: flex; gap: 15px; align-items: flex-start; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border-left: 3px solid var(--accent-neon);">
                        <input type="checkbox" id="setuju" required style="width: 20px; height: 20px; margin-top: 2px; accent-color: var(--accent-neon); cursor: pointer;">
                        <label for="setuju" style="color: var(--text-light); font-size: 0.9rem; line-height: 1.5; cursor: pointer;">Saya bersedia dihubungi oleh pihak Admin BEM FKG UMI apabila diperlukan klarifikasi lebih lanjut mengenai aspirasi ini <span style="color:#ef4444">*</span></label>
                    </div>
            
                    <button type="submit" class="holo-btn" style="width: 100%;">Kirim Aspirasi</button>
                </form>
                <div id="plasmaResult" style="margin-top:20px; text-align:center; display:none; padding:10px; border-radius:10px;"></div>
            </div>
        </section>

    </main>

    <!-- Modal Dokumentasi Galeri -->
    <div class="modal-overlay" id="docModal">
        <div class="modal-content-box" style="padding: 0; overflow: hidden;">
            <button class="modal-close" onclick="document.getElementById('docModal').classList.remove('active')">X</button>
            <div style="width: 100%; max-height: 400px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000;">
                <img id="docImg" src="" style="width:100%; object-fit: contain; max-height: 400px;">
            </div>
            <div style="padding: 30px;">
                <h2 id="docTitle" style="color: var(--accent-neon); margin-bottom: 5px;">Judul Kegiatan</h2>
                <p id="docDate" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;"></p>
                <p id="docDesc" style="line-height: 1.8; color: var(--text-light);"></p>
            </div>
        </div>
    </div>

    <%- include('partials/footer.html') %>

    <script>
        let kalenderData = [];
        let curDate = new Date(); 
        const monthNames = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];
        const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        
        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            let resData = { proker: [], dokumentasi: [], kalender: [] };
            
            try {
                let apiUrl = '/api/content';
                if(window.location.protocol === 'blob:' || window.location.origin === "null") apiUrl = 'https://bemkbmfkgumi.com/api/content';
                const req = await fetch(apiUrl);
                if (req.ok) resData = await req.json();
            } catch (err) { console.warn("API Error, Mock Data dimuat."); }
            
            renderProker(resData.proker);
            renderDokumentasi(resData.dokumentasi);
            kalenderData = resData.kalender || [];
            renderCalendar();

            handleHashTabOnLoad();
        });

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            const targetBtn = document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`);
            if(targetBtn) targetBtn.classList.add('active');
            
            const targetSection = document.getElementById(t);
            if(targetSection) {
                targetSection.classList.add('active');
                targetSection.style.opacity = '0';
                setTimeout(() => { targetSection.style.opacity = '1'; }, 50);

                if(window.location.hash !== '#' + t) { history.pushState(null, null, '#' + t); }
                
                // Reset calendar selection when entering calendar tab to show full month
                if(t === 'kalender') { renderCalendar(); tampilkanAgendaSebulan(); }
            }
        }

        function handleHashTabOnLoad() {
            const hash = window.location.hash.substring(1);
            const validTabs = ['proker', 'kalender', 'galeri', 'plasma'];
            if (hash && validTabs.includes(hash)) {
                switchTab(hash);
                setTimeout(() => {
                    const navEl = document.getElementById('tabNavMenu');
                    if (navEl) { window.scrollTo({ top: navEl.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' }); }
                }, 300);
            }
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            const validTabs = ['proker', 'kalender', 'galeri', 'plasma'];
            if (hash && validTabs.includes(hash)) { switchTab(hash); }
        });

        function renderProker(prokerData) {
            const pCont = document.getElementById('prokerContainer'); pCont.innerHTML = '';
            if(prokerData && prokerData.length > 0) {
                prokerData.forEach(p => {
                    let listHtml = p.list.map(l => `<li style="margin-bottom:12px; display:flex; gap:10px;"><span style="color:var(--accent-neon);">✔️</span> <span>${l}</span></li>`).join('');
                    pCont.innerHTML += `<div class="glass-card" style="margin-bottom: 25px; padding: 30px; border-left: 4px solid var(--accent-neon);"><h3 style="color: var(--text-light); margin-bottom:15px; font-size: 1.4rem;">${p.dept}</h3><ul style="list-style:none; padding-left:0; color: var(--text-muted);">${listHtml}</ul></div>`;
                });
            } else { pCont.innerHTML = `<div style="text-align:center; color: var(--text-muted);">Data program kerja belum dipublikasikan Admin.</div>`; }
        }

        function renderDokumentasi(docData) {
            const gCont = document.getElementById('galleryContainer'); gCont.innerHTML = '';
            if(docData && docData.length > 0) {
                window.globalDocData = docData; 
                docData.forEach((d, i) => {
                    const fallbackImg = d.foto ? d.foto : '/img/bemfkgumi.png';
                    gCont.innerHTML += `<div class="gallery-card" onclick="openDoc(${i})" style="box-shadow: 0 10px 30px rgba(0,0,0,0.5);"><div style="width: 100%; height: 100%; background: #111; display:flex; align-items:center; justify-content:center;"><img src="${fallbackImg}" class="gallery-img"></div><div class="gallery-info" style="background: linear-gradient(to top, rgba(7, 11, 25, 0.95), transparent);"><h4 style="color: var(--accent-neon);">${d.judul}</h4><span style="font-size:0.85rem; color: var(--text-muted);">${formatTgl(d.tanggal)}</span></div></div>`;
                });
            } else { gCont.innerHTML = `<div style="text-align:center; grid-column: 1/-1; color: var(--text-muted);">Belum ada dokumentasi.</div>`; }
        }

        function formatTgl(tglStr) { if(!tglStr) return ''; const d = new Date(tglStr); if(isNaN(d)) return tglStr; return `${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}`; }
        function openDoc(idx) {
            const d = window.globalDocData[idx];
            document.getElementById('docImg').src = d.foto || '/img/bemfkgumi.png';
            document.getElementById('docTitle').innerText = d.judul;
            document.getElementById('docDate').innerHTML = `🗓️ ${formatTgl(d.tanggal)}`;
            document.getElementById('docDesc').innerText = d.deskripsi;
            document.getElementById('docModal').classList.add('active');
        }

        function gantiBulan(dir) { 
            curDate.setMonth(curDate.getMonth() + dir); 
            renderCalendar(); 
            tampilkanAgendaSebulan(); 
        }
        
        function renderCalendar() {
            const year = curDate.getFullYear(); const month = curDate.getMonth();
            document.getElementById('namaBulanTahun').innerText = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let gridHTML = `<div class="calendar-day-name">MIN</div><div class="calendar-day-name">SEN</div><div class="calendar-day-name">SEL</div><div class="calendar-day-name">RAB</div><div class="calendar-day-name">KAM</div><div class="calendar-day-name">JUM</div><div class="calendar-day-name">SAB</div>`;
            for(let i=0; i<firstDay; i++) gridHTML += `<div></div>`;
            
            for(let d=1; d<=daysInMonth; d++) {
                const isEvent = kalenderData.some(ev => { 
                    if(!ev.tglMulai) return false; 
                    const eStart = new Date(ev.tglMulai);
                    const eEnd = ev.tglSelesai ? new Date(ev.tglSelesai) : eStart;
                    const checkDate = new Date(year, month, d);
                    // Hilangkan jam untuk komparasi
                    eStart.setHours(0,0,0,0); eEnd.setHours(0,0,0,0); checkDate.setHours(0,0,0,0);
                    return checkDate >= eStart && checkDate <= eEnd;
                });
                
                gridHTML += `<div class="calendar-day ${isEvent ? 'has-event' : ''}" onclick="pilihTanggal(${d}, ${month}, ${year}, this)" id="day-${d}">${d}</div>`;
            }
            document.getElementById('calGrid').innerHTML = gridHTML;
        }

        // ================= BIG UPGRADE: AGENDA RANGE & BADGES =================
        function formatTglRange(startStr, endStr) {
            const s = new Date(startStr); const e = endStr ? new Date(endStr) : s;
            if(s.getTime() === e.getTime()) return `${s.getDate()} ${monthNames[s.getMonth()]} ${s.getFullYear()}`;
            if(s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear()) return `${s.getDate()} - ${e.getDate()} ${monthNames[s.getMonth()]} ${s.getFullYear()}`;
            return `${s.getDate()} ${monthNames[s.getMonth()]} - ${e.getDate()} ${monthNames[e.getMonth()]} ${s.getFullYear()}`;
        }

        function getAgendaStatus(startStr, endStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const s = new Date(startStr); s.setHours(0,0,0,0);
            const e = endStr ? new Date(endStr) : s; e.setHours(0,0,0,0);
            if(today >= s && today <= e) return { text: "SEDANG BERLANGSUNG", class: "badge-blue" };
            if(today < s) return { text: "SEGERA HADIR", class: "badge-neon" };
            return { text: "SELESAI DILAKSANAKAN", class: "badge-gray" };
        }

        function tampilkanAgendaSebulan() {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('active'));
            const year = curDate.getFullYear(); const month = curDate.getMonth();
            document.getElementById('agendaSubtitle').innerText = "DAFTAR AGENDA BULAN INI";
            document.getElementById('agendaTglFormat').innerHTML = `<span style="color:var(--text-light)">Semua Agenda ${monthNames[month]} ${year}</span>`;
            
            const events = kalenderData.filter(ev => { 
                if(!ev.tglMulai) return false; 
                const s = new Date(ev.tglMulai); const e = ev.tglSelesai ? new Date(ev.tglSelesai) : s;
                return (s.getMonth() === month && s.getFullYear() === year) || (e.getMonth() === month && e.getFullYear() === year) || (s <= new Date(year, month, 1) && e >= new Date(year, month+1, 0));
            });
            renderAgendaList(events);
        }

        function pilihTanggal(d, m, y, elem) {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('active'));
            const targetElem = elem || document.getElementById(`day-${d}`);
            if(targetElem) targetElem.classList.add('active');

            const checkDate = new Date(y, m, d); checkDate.setHours(0,0,0,0);
            document.getElementById('agendaSubtitle').innerText = "AGENDA PADA TANGGAL";
            document.getElementById('agendaTglFormat').innerHTML = `<span style="font-size: 1rem; display:block; color: var(--text-muted); margin-bottom: 5px;">${dayNames[checkDate.getDay()]},</span> ${d} ${monthNames[m]} ${y}`;
            
            const events = kalenderData.filter(ev => { 
                if(!ev.tglMulai) return false; 
                const s = new Date(ev.tglMulai); s.setHours(0,0,0,0);
                const e = ev.tglSelesai ? new Date(ev.tglSelesai) : s; e.setHours(0,0,0,0);
                return checkDate >= s && checkDate <= e; 
            });
            renderAgendaList(events);
        }

        function renderAgendaList(events) {
            const cont = document.getElementById('agendaContent'); cont.innerHTML = '';
            if(events.length > 0) {
                // Sort events by start date
                events.sort((a,b) => new Date(a.tglMulai) - new Date(b.tglMulai));
                events.forEach(e => { 
                    const status = getAgendaStatus(e.tglMulai, e.tglSelesai);
                    cont.innerHTML += `
                    <div class="agenda-item" style="background: rgba(0, 210, 255, 0.05); border-left: 4px solid var(--accent-neon); padding: 20px; border-radius: 10px; margin-bottom: 15px; display:flex; flex-direction:column;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;">
                            <span class="${status.class}" style="font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; letter-spacing:1px;">${status.text}</span>
                            <span style="font-size:0.8rem; color:var(--text-muted);"><svg viewBox="0 0 24 24" style="width:12px; fill:currentColor; vertical-align:-2px;"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg> ${formatTglRange(e.tglMulai, e.tglSelesai)}</span>
                        </div>
                        <h4 style="color:var(--text-light); margin: 5px 0 10px; font-size: 1.3rem;">${e.nama}</h4>
                        <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom: 20px;">🏢 ${e.dept}</p>
                        <a href="/proker-detail?id=${e.id}" class="glass-btn" style="text-align:center; padding: 10px; font-size:0.9rem; margin-top:auto;">Detail Kegiatan &rarr;</a>
                    </div>`; 
                });
            } else { 
                cont.innerHTML = `<div style="text-align:center; padding: 40px 0; opacity: 0.5;">📭 Tidak ada agenda pada waktu ini.</div>`; 
            }
        }

        // ====== PENGIRIMAN DATA FORM PLASMA ======
        document.getElementById('plasmaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "Mengirim..."; btn.disabled = true;

            const judul = document.getElementById('judul').value;
            const kategori = document.getElementById('kategori').value;
            const jenis = document.querySelector('input[name="jenis"]:checked').value;
            const isi = document.getElementById('isi').value;
            
            let buktiBase64 = null;
            const fileInput = document.getElementById('bukti');
            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                reader.onload = async () => {
                    buktiBase64 = reader.result;
                    await kirimDataPlasma(judul, kategori, jenis, isi, buktiBase64, btn);
                }
            } else {
                await kirimDataPlasma(judul, kategori, jenis, isi, buktiBase64, btn);
            }
        });

        async function kirimDataPlasma(judul, kategori, jenis, isi, bukti, btn) {
            try {
                let apiUrl = '/api/plasma';
                if(window.location.protocol === 'blob:' || window.location.origin === "null") apiUrl = 'https://bemkbmfkgumi.com/api/plasma';
                
                const req = await fetch(apiUrl, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ judul, kategori, jenis, isi, bukti })
                });
                const res = await req.json();
                
                const resultDiv = document.getElementById('plasmaResult');
                resultDiv.style.display = 'block';
                if(res.success) {
                    resultDiv.style.background = 'rgba(16, 185, 129, 0.2)'; resultDiv.style.color = '#10b981';
                    resultDiv.innerText = "✅ Aspirasi berhasil dikirim!";
                    document.getElementById('plasmaForm').reset();
                } else { throw new Error(); }
            } catch (error) {
                const resultDiv = document.getElementById('plasmaResult');
                resultDiv.style.display = 'block';
                resultDiv.style.background = 'rgba(239, 68, 68, 0.2)'; resultDiv.style.color = '#ef4444';
                resultDiv.innerText = "⚠️ Gagal mengirim aspirasi. Coba lagi.";
            }
            btn.innerText = "Kirim Aspirasi"; btn.disabled = false;
        }
    </script>
</body>
</html>
