<script>
    // Fitur toggle menu dropdown khusus tampilan Mobile
    function toggleMobileMenu(element) {
        if(window.innerWidth <= 768) {
            element.classList.toggle('mobile-expand');
        }
    }

    // Smart Script: Mendeteksi Hash URL (#proker, #struktur, #filosofi dll)
    function handleHashNavigation() {
        const hash = window.location.hash.substring(1);
        if (hash) {
            // 1. Logika untuk halaman Informasi (Berpindah Tab)
            if (typeof switchTab === 'function') {
                const targetTab = document.getElementById(hash);
                if (targetTab && targetTab.classList.contains('tab-content')) {
                    switchTab(hash);
                }
            }
            
            // 2. Logika untuk halaman Tentang (Scroll ke Section)
            const section = document.getElementById(hash);
            if (section && !section.classList.contains('tab-content')) {
                setTimeout(() => {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
            
            // Tutup menu mobile jika sedang terbuka setelah klik
            if(window.innerWidth <= 768) {
                document.querySelector('.nav-links').classList.remove('active');
            }
        }
    }

    // Jalankan saat halaman dimuat & saat hash berubah (klik dari Header ke halaman yang sama)
    document.addEventListener('DOMContentLoaded', handleHashNavigation);
    window.addEventListener('hashchange', handleHashNavigation);
</script>
