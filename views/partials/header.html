<header>
    <nav>
        <a href="/" class="logo-container" style="text-decoration: none;">
            <img src="/img/bemfkgumi.png" alt="Logo BEM FKG UMI" style="height: 45px; filter: drop-shadow(0 0 12px rgba(0,229,255,0.6));">
            <span style="font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; color: white; text-shadow: 0 0 10px rgba(0,229,255,0.3);">BEM KBMFKG UMI</span>
        </a>
        
        <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="var(--accent-neon)"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </div>
        
        <div class="nav-links">
            <div class="nav-item">
                <a href="/">Beranda</a>
            </div>
            
            <div class="nav-item" onclick="toggleMobileMenu(this)">
                <a href="javascript:void(0)">Tentang ▾</a>
                <div class="mega-menu">
                    <a href="/tentang#visimisi">Visi & Misi</a>
                    <a href="/tentang#struktur">Struktur Kepengurusan</a>
                    <a href="/tentang#sejarah">Sejarah Kepengurusan</a>
                </div>
            </div>
            
            <div class="nav-item" onclick="toggleMobileMenu(this)">
                <a href="javascript:void(0)">Informasi ▾</a>
                <div class="mega-menu">
                    <a href="/informasi#proker">Program Kerja</a>
                    <a href="/informasi#kalender">Kalender Proker</a>
                    <a href="/informasi#galeri">Dokumentasi Kegiatan</a>
                    <a href="/informasi#plasma">PLASMA (Aspirasi)</a>
                </div>
            </div>
            
            <div class="nav-item" style="margin-left: 10px;">
                <a href="/narahubung" class="holo-btn" style="padding: 10px 25px; font-size: 0.95rem; width: 100%;">Hubungi Kami</a>
            </div>
        </div>
    </nav>
</header>

<script>
    // Fitur toggle menu dropdown khusus tampilan Mobile
    function toggleMobileMenu(element) {
        if(window.innerWidth <= 768) {
            element.classList.toggle('mobile-expand');
        }
    }

    // Smart Script: Mendeteksi Hash URL (#proker, #kalender, dll) lalu mengaktifkan fungsi switchTab otomatis
    function handleHashNavigation() {
        const hash = window.location.hash.substring(1);
        if (hash && typeof switchTab === 'function') {
            switchTab(hash);
            
            // Tutup menu mobile jika sedang terbuka setelah klik
            if(window.innerWidth <= 768) {
                document.querySelector('.nav-links').classList.remove('active');
            }
        }
    }

    // Jalankan saat halaman pertama dimuat & saat hash URL berubah (klik dari Header)
    document.addEventListener('DOMContentLoaded', handleHashNavigation);
    window.addEventListener('hashchange', handleHashNavigation);
</script>
