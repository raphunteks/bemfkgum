<!-- FILE: views/tentang.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentang Kabinet | BEM KBMFKG UMI</title>
    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <%- include('partials/header.html') %>
    <main class="container" style="padding-top: 60px; padding-bottom: 60px;">
        
        <div class="reveal" style="text-align: center; margin-bottom: 70px;">
            <div class="clay-badge" style="margin-bottom: 15px;">PROFIL ORGANISASI</div>
            <h1 style="font-size: 3.5rem; font-weight: 900;">Visi & Misi <br><span class="script-font" style="font-size: 1.2em; display:block; margin-top:10px;">Ananta Anardhaya</span></h1>
        </div>

        <!-- VISI -->
        <section class="reveal" style="margin-bottom: 50px;">
            <div class="glass-card" style="text-align: center; padding: 50px 30px;">
                <h2 style="color: var(--accent-neon); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">Visi Kami</h2>
                <p id="teksVisi" style="font-size: 1.5rem; font-style: italic; line-height: 1.6; font-weight: 500; color: var(--text-light); max-width: 900px; margin: 0 auto;">
                    Memuat data visi...
                </p>
            </div>
        </section>

        <!-- MISI -->
        <section class="reveal" style="margin-bottom: 100px;">
            <div class="glass-card">
                <h2 style="font-size: 1.5rem; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">Misi Kami</h2>
                <ul id="listMisi" style="list-style: none; display: flex; flex-direction: column; gap: 15px; padding-left: 10px;">
                    <!-- JS Injeksi -->
                </ul>
            </div>
        </section>

        <!-- STRUKTUR KEPENGURUSAN -->
        <section class="reveal" style="margin-bottom: 100px;">
            <div style="text-align: center; margin-bottom: 50px;">
                <h2 style="font-size: 2.8rem;">Struktur <span style="color: var(--accent-neon);">Kepengurusan</span></h2>
            </div>
            
            <h3 style="text-align:center; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;">Pimpinan Inti BEM</h3>
            <div class="grid-4" id="containerPimpinan" style="margin-bottom: 80px;">
                <div style="text-align:center; grid-column: span 4;">Memuat pimpinan dari database...</div>
            </div>

            <div id="containerDepartemen">
                <!-- JS Injeksi Grid Per Departemen -->
            </div>
        </section>
    </main>
    <%- include('partials/footer.html') %>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            
            try {
                const req = await fetch('/api/content');
                const res = await req.json();
                const orgData = res.org;

                // Visi & Misi
                document.getElementById('teksVisi').innerText = `"${orgData.visi}"`;
                const ulMisi = document.getElementById('listMisi');
                ulMisi.innerHTML = '';
                if(orgData.misi) {
                    orgData.misi.forEach(m => {
                        ulMisi.innerHTML += `<li style="display:flex; gap:15px; align-items:flex-start;"><span style="color:var(--accent-neon); font-size:1.2rem;">&#10004;</span> <span style="font-size: 1.1rem; line-height: 1.5; color: var(--text-muted);">${m}</span></li>`;
                    });
                }

                // Pimpinan Inti
                const pimContainer = document.getElementById('containerPimpinan');
                pimContainer.innerHTML = '';
                orgData.pimpinan.forEach(pim => {
                    const pic = pim.foto || '/img/bemfkgumi.png';
                    pimContainer.innerHTML += `
                        <div class="leader-card">
                            <div class="leader-photo" style="background-image: url('${pic}');"></div>
                            <h3 style="font-size: 1.2rem; margin-bottom: 5px;">${pim.nama}</h3>
                            <p style="color: var(--accent-neon); font-size: 0.85rem; font-weight:bold;">${pim.jabatan}</p>
                        </div>
                    `;
                });

                // Departemen & Anggota
                const depContainer = document.getElementById('containerDepartemen');
                depContainer.innerHTML = '';
                orgData.departemen.forEach(dep => {
                    let anggotaHTML = '';
                    if(dep.anggota) {
                        dep.anggota.forEach(ang => {
                            const angPic = ang.foto || '/img/bemfkgumi.png';
                            anggotaHTML += `
                                <div class="leader-card" style="padding: 20px 10px;">
                                    <div class="leader-photo" style="width: 80px; height: 80px; border-width: 2px; background-image: url('${angPic}');"></div>
                                    <h4 style="font-size: 1rem; margin-bottom: 5px;">${ang.nama}</h4>
                                    <p style="color: var(--text-muted); font-size: 0.8rem;">${ang.jabatan}</p>
                                </div>
                            `;
                        });
                    }
                    depContainer.innerHTML += `
                        <div class="dept-container reveal active">
                            <h3 class="dept-header">${dep.nama}</h3>
                            <div class="grid-4">${anggotaHTML}</div>
                        </div>
                    `;
                });

            } catch (err) { console.warn(err); }
        });
    </script>
</body>
</html>
