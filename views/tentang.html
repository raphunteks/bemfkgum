<!-- FILE: views/tentang.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentang Kabinet | BEM FKG UMI</title>
    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    
    <!-- MURNI PANGGIL DARI MAIN.CSS -->
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <%- include('partials/header.html') %>
    <main class="container" style="padding-top: 60px; padding-bottom: 60px;">
        
        <div class="reveal" style="text-align: center; margin-bottom: 70px;">
            <div class="clay-badge" style="margin-bottom: 15px;">PROFIL ORGANISASI</div>
            <h1 style="font-size: 3rem; font-weight: 900;">Tentang <span style="color: var(--accent-neon);">Kabinet</span></h1>
        </div>

        <section id="visimisi" class="reveal" style="margin-bottom: 100px;">
            <div class="glass-card" style="text-align: center; position: relative; overflow: hidden; padding: 60px 30px;">
                <h2 style="color: var(--accent-neon); font-size: 2.2rem; margin-bottom: 20px;">Visi Kami</h2>
                <div style="font-size: 3rem; color: rgba(255,255,255,0.1); position: absolute; top: 30px; left: 50%; transform: translateX(-50%);">&#10077;</div>
                <p id="teksVisi" style="font-size: 1.8rem; font-style: italic; margin: 30px auto; line-height: 1.6; font-weight: 300; max-width: 900px;">
                    Loading Visi Organisasi...
                </p>
            </div>
        </section>

        <!-- STRUKTUR DINAMIS DARI DATABASE -->
        <section id="struktur" class="reveal" style="margin-bottom: 100px;">
            <div style="text-align: center; margin-bottom: 50px;">
                <h2 style="font-size: 2.5rem;">Struktur <span style="color: var(--accent-neon);">Pimpinan</span></h2>
            </div>
            
            <div class="grid-2" style="max-width: 800px; margin: 0 auto;" id="containerPimpinan">
                <!-- Injeksi JS -->
                <div style="text-align:center; grid-column: span 2;">Memuat data dari database Upstash...</div>
            </div>
        </section>

        <!-- 9 DEPARTEMEN DINAMIS -->
        <section class="reveal" style="margin-bottom: 100px;">
            <h3 style="text-align:center; margin-bottom: 40px; font-size: 2rem;">Departemen <span style="color: var(--accent-neon);">Penggerak</span></h3>
            <div class="grid-3" id="containerDepartemen">
                <!-- Injeksi JS -->
            </div>
        </section>
    </main>
    <%- include('partials/footer.html') %>

    <script>
        // Animasi
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver(entries => { entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); }); });
            reveals.forEach(el => observer.observe(el));
            setTimeout(() => { if(document.querySelector('.reveal')) document.querySelector('.reveal').classList.add('active'); }, 100);
            
            // FETCH DATA DARI DATABASE REDIS PADA SAAT PAGE LOAD
            loadOrgData();
        });

        async function loadOrgData() {
            try {
                const req = await fetch('/api/org');
                const res = await req.json();
                
                // DATA DEFAULT JIKA DATABASE MASIH KOSONG
                let orgData = {
                    visi: "Terwujudnya BEM FKG UMI sebagai episentrum sinergi dalam merajut asa bagi seluruh mahasiswa menuju keunggulan akademis dan akhlakul karimah.",
                    pimpinan: [
                        { jabatan: "Presiden BEM", nama: "Sanditya Saputra", angkatan: "2023", foto: "" },
                        { jabatan: "Wakil Presiden", nama: "Azizah Najda", angkatan: "2023", foto: "" }
                    ],
                    departemen: [
                        { nama: "Character of Building", deskripsi: "Pengembangan kaderisasi dan SDM.", ikon: "👥" }
                    ]
                };

                if(res.success && res.data) {
                    orgData = JSON.parse(res.data);
                }

                // RENDER VISI
                document.getElementById('teksVisi').innerText = `"${orgData.visi}"`;

                // RENDER PIMPINAN
                const pimContainer = document.getElementById('containerPimpinan');
                pimContainer.innerHTML = '';
                orgData.pimpinan.forEach(pim => {
                    const bgStyle = pim.foto ? `background-image: url('${pim.foto}');` : '';
                    pimContainer.innerHTML += `
                        <div class="leader-card">
                            <div class="leader-photo" style="${bgStyle}">
                                ${!pim.foto ? `<span style="color: var(--text-muted); font-size: 0.8rem;">[Foto]</span>` : ''}
                            </div>
                            <div class="clay-badge" style="margin-bottom:15px; background: rgba(0,255,128,0.15); color: var(--accent-neon);">${pim.jabatan}</div>
                            <h3 style="font-size: 1.8rem; margin-bottom: 5px;">${pim.nama}</h3>
                            <p style="color: var(--text-muted); font-size: 0.9rem;">FKG UMI ${pim.angkatan}</p>
                        </div>
                    `;
                });

                // RENDER DEPARTEMEN
                const depContainer = document.getElementById('containerDepartemen');
                depContainer.innerHTML = '';
                orgData.departemen.forEach(dep => {
                    depContainer.innerHTML += `
                        <div class="dept-card">
                            <div class="dept-icon">${dep.ikon || '🏢'}</div>
                            <h4 style="color: var(--text-light); font-size: 1.1rem; margin-bottom: 8px;">${dep.nama}</h4>
                            <p style="font-size: 0.85rem; color: var(--text-muted);">${dep.deskripsi}</p>
                        </div>
                    `;
                });

            } catch (err) {
                console.warn("Gagal render data dinamis.", err);
            }
        }
    </script>
</body>
</html>
