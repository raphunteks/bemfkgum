<!-- FILE: views/proker-deskripsi.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Departemen | BEM KBMFKG UMI</title>
    
    <!-- ================= SEO GOLD STANDARD ================= -->
    <meta name="description" content="Informasi detail mengenai fungsi, program kerja, penanggung jawab, dan koordinator Departemen di BEM KBMFKG UMI.">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <link rel="preload" href="/css/main.css" as="style">
    <link rel="stylesheet" href="/css/main.css">
    
    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    <script src="/js/protect-devtools.js"></script>

    <style>
        .proker-banner-wrapper {
            border-radius: 25px; 
            box-shadow: 0 20px 50px var(--card-shadow); 
            overflow: hidden; 
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
        }
        .proker-banner-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .proker-banner-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(11, 19, 43, 0.8) 60%, transparent 100%);
            padding: 80px 40px 40px;
        }
        .detail-section-title {
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 25px;
            padding-left: 18px;
            border-left: 5px solid var(--accent-neon);
            font-weight: 800;
        }
        .fungsi-list li, .proker-list li {
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .sub-proker {
            padding-left: 30px;
            list-style: circle;
            color: var(--text-muted);
            margin-top: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <%- include('partials/header.html') %>

    <main class="container" style="padding-top: 30px; min-height: 70vh; padding-bottom: 80px;" id="mainContent">
        <div style="text-align:center; padding: 100px 0;">
            <div style="width: 40px; height: 40px; border: 4px solid var(--accent-neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <span style="color: var(--text-muted);">Memuat Data Departemen...</span>
        </div>
    </main>

    <%- include('partials/footer.html') %>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const pathParts = window.location.pathname.split('/');
            const slug = pathParts[pathParts.length - 1];
            
            try {
                let apiUrl = '/api/content';
                if(window.location.protocol === 'blob:' || window.location.origin === "null") apiUrl = 'https://bemkbmfkgumi.com/api/content';
                
                const req = await fetch(apiUrl);
                if(!req.ok) throw new Error("Gagal mengambil data");
                
                const res = await req.json();
                const allProker = res.proker || [];
                
                const deptData = allProker.find(p => p.id === slug);
                
                if(!deptData) {
                    document.getElementById('mainContent').innerHTML = `
                        <div style="text-align:center; padding: 100px 0;">
                            <h2 style="font-size: 2rem; color: #ef4444; margin-bottom: 10px;">404 - Departemen Tidak Ditemukan</h2>
                            <p style="color: var(--text-muted); margin-bottom: 30px;">Data departemen atau program kerja tidak tersedia di database.</p>
                            <a href="/informasi#proker" class="holo-btn">Kembali ke Pusat Informasi</a>
                        </div>
                    `;
                    return;
                }
                
                renderDetail(deptData);

            } catch (err) {
                document.getElementById('mainContent').innerHTML = `<div style="text-align:center; color: #ef4444; padding:100px;">Terjadi kesalahan sistem.</div>`;
            }
        });

        function renderDetail(data) {
            const bgImg = data.bgImage || '/img/bemfkgumi.png';
            let fungsiHtml = '';
            if(data.fungsi && data.fungsi.length > 0) {
                fungsiHtml = data.fungsi.map(f => `<li><span style="color:var(--accent-neon);">✔️</span> <span>${f}</span></li>`).join('');
            } else {
                fungsiHtml = `<li><span style="color:var(--text-muted);">Belum ada data fungsi.</span></li>`;
            }

            let prokerHtml = '';
            if(data.listProker && data.listProker.length > 0) {
                data.listProker.forEach(pk => {
                    let detailHtml = '';
                    if(pk.detail && pk.detail.length > 0) {
                        detailHtml = `<ul class="sub-proker">` + pk.detail.map(d => `<li>${d}</li>`).join('') + `</ul>`;
                    }
                    prokerHtml += `<li><span style="color:var(--accent-neon);">🚀</span> <div><strong>${pk.nama}</strong>${detailHtml}</div></li>`;
                });
            } else {
                prokerHtml = `<li><span style="color:var(--text-muted);">Belum ada program kerja yang diinput.</span></li>`;
            }

            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- BAGIAN BANNER -->
                <div class="proker-banner-wrapper reveal active">
                    <img src="${bgImg}" alt="Banner ${data.dept}" class="proker-banner-img" width="1920" height="1080" fetchpriority="high">
                    <div class="proker-banner-overlay">
                        <div class="clay-badge" style="margin-bottom: 15px; font-size:0.75rem;">DETAIL DEPARTEMEN</div>
                        <h1 style="font-size: 3rem; font-weight: 900; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">${data.dept}</h1>
                        <p style="color: #e2e8f0; font-size: 1.1rem; max-width: 800px; margin-top: 10px;">${data.shortDesc || ''}</p>
                    </div>
                </div>

                <div class="grid-2" style="margin-bottom: 40px;">
                    <!-- BAGIAN KIRI: FUNGSI DAN PROKER -->
                    <div class="glass-card reveal active" style="transition-delay: 0.1s;">
                        <h2 class="detail-section-title">Fungsi Departemen</h2>
                        <ul class="fungsi-list" style="list-style:none; padding-left:0; margin-bottom: 40px;">
                            ${fungsiHtml}
                        </ul>

                        <h2 class="detail-section-title" style="border-left-color: #f59e0b;">Program Kerja</h2>
                        <ul class="proker-list" style="list-style:none; padding-left:0;">
                            ${prokerHtml}
                        </ul>
                    </div>

                    <!-- BAGIAN KANAN: METADATA & PENANGGUNG JAWAB -->
                    <div class="reveal active" style="transition-delay: 0.2s;">
                        <div class="glass-card" style="margin-bottom: 30px;">
                            <h2 class="detail-section-title" style="border-left-color: #10b981; font-size: 1.4rem;">Informasi Pelaksanaan</h2>
                            
                            <div class="info-row">
                                <div class="info-icon-wrapper ic-lokasi">📍</div>
                                <div>
                                    <span class="detail-info-label">Titik Lokasi Utama</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.lokasi || 'Kondisional'}</strong>
                                </div>
                            </div>
                            
                            <div class="info-row">
                                <div class="info-icon-wrapper ic-waktu">⏱️</div>
                                <div>
                                    <span class="detail-info-label">Target Pelaksanaan</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.targetPelaksanaan || 'Sepanjang Periode'}</strong>
                                </div>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h2 class="detail-section-title" style="border-left-color: #8b5cf6; font-size: 1.4rem;">Struktur Pengurus</h2>
                            
                            <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-light);">
                                <span class="detail-info-label">Koordinator Departemen</span>
                                <strong style="color: var(--accent-neon); font-size: 1.2rem;">${data.koordinator || '-'}</strong>
                            </div>

                            <div>
                                <span class="detail-info-label">Penanggung Jawab Proker / Anggota</span>
                                <p style="color: var(--text-muted); line-height: 1.8; font-weight: 500;">
                                    ${data.penanggungJawab ? data.penanggungJawab.replace(/,/g, '<br>• ') : '-'}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 50px;">
                    <a href="/informasi#proker" class="glass-btn">&larr; Kembali ke Pusat Informasi</a>
                </div>
            `;
        }
    </script>
</body>
</html>
