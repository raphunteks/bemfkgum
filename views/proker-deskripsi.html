<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Program Kerja | BEM KBMFKG UMI</title>
    
    <!-- ================= SEO GOLD STANDARD ================= -->
    <meta name="description" content="Informasi detail mengenai pelaksanaan, target, dan kepanitiaan program kerja BEM KBMFKG UMI.">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <link rel="preload" href="/css/main.css" as="style">
    <link rel="stylesheet" href="/css/main.css">
    
    <link rel="icon" type="image/png" href="/img/bemfkgumi.png">
    <script src="/js/protect-devtools.js"></script>

    <style>
        .proker-banner-wrapper {
            border-radius: 25px; 
            box-shadow: 0 20px 50px var(--card-shadow); 
            overflow: hidden; 
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
        }
        .proker-banner-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .proker-banner-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(11, 19, 43, 0.8) 60%, transparent 100%);
            padding: 80px 40px 40px;
        }
        .detail-section-title {
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 25px;
            padding-left: 18px;
            border-left: 5px solid var(--accent-neon);
            font-weight: 800;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-dark-heavy);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            box-shadow: inset 2px 2px 5px var(--card-shadow);
        }
        .info-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .ic-lokasi { color: #ef4444; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); }
        .ic-waktu { color: var(--accent-neon); background: var(--bg-dark-overlay); border: 1px solid var(--accent-glow); }
        .ic-target { color: #8b5cf6; background: rgba(167, 139, 250, 0.1); border: 1px solid rgba(167, 139, 250, 0.2); }
        
        .panitia-box {
            background: var(--bg-dark-heavy);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px var(--card-shadow);
        }
        .panitia-title {
            color: var(--text-light);
            font-size: 1.15rem;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }
        .panitia-title::before { content: '❖'; color: #10b981; font-size: 1rem; }
        .panitia-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .panitia-table th { color: var(--text-muted); text-align: left; font-size: 0.85rem; padding: 0 15px 8px; border-bottom: 1px solid var(--border-light); }
        .panitia-table td { background: var(--bg-dark-overlay); padding: 12px 15px; color: var(--text-light); }
        .panitia-table td:first-child { border-radius: 12px 0 0 12px; border-left: 1px solid var(--border-light); }
        .panitia-table td:last-child { border-radius: 0 12px 12px 0; border-right: 1px solid var(--border-light); text-align: right; color: var(--accent-neon); font-weight: bold; font-size: 0.9rem; }

        .active-daftar {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff !important;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: block;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }
        .active-daftar:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.6);
        }

        @media(max-width: 900px) {
            .grid-2 { grid-template-columns: 1fr !important; }
            .proker-banner-img { height: 300px; }
            .proker-banner-overlay { padding: 40px 20px 20px; }
        }
    </style>
</head>
<body>
    <%- include('partials/header.html') %>

    <main class="container" style="padding-top: 30px; min-height: 70vh; padding-bottom: 80px;" id="mainContent">
        <!-- Area Loading Awal -->
        <div style="text-align:center; padding: 100px 0;">
            <div style="width: 40px; height: 40px; border: 4px solid var(--accent-neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <span style="color: var(--text-muted);">Memuat Detail Program Kerja...</span>
        </div>
    </main>

    <%- include('partials/footer.html') %>

    <script>
        // ================= BIG UPGRADE: FALLBACK DATA ANTI-CRASH =================
        const FALLBACK_KALENDER = [
            {
                id: "umi-amal-senyuman-uas-vol-iv",
                slug: "umi-amal-senyuman-uas-vol-iv",
                nama: "UMI Amal Senyuman (UAS) Vol. IV",
                dept: "Dept. of Dedication Humanity",
                tglMulai: "2026-07-24",
                tglSelesai: "2026-07-26",
                banner: "/img/bemfkgumi.png",
                deskripsi: "WELCOME TO UAS VOL. IV\n\nSaatnya membawa nama himpunan menuju arena pengabdian terbesar di FKG UMI! Kegiatan ini merupakan wujud nyata Tridharma Perguruan Tinggi yang menjunjung tinggi nilai kemanusiaan dan kepedulian sosial.",
                lokasi: "Desa Binaan FKG UMI",
                targetPeserta: "Seluruh Mahasiswa FKG UMI",
                statusDaftar: "Buka",
                linkDaftar: "https://bit.ly/DaftarUASVol4",
                kepanitiaan: [
                    {
                        namaDivisi: "Inti Kegiatan",
                        anggota: [
                            { nama: "Fajri", jabatan: "Steering Committee" },
                            { nama: "Rizky", jabatan: "Ketua Panitia" },
                            { nama: "Dian", jabatan: "Sekretaris" },
                            { nama: "Amelia", jabatan: "Bendahara" }
                        ]
                    },
                    {
                        namaDivisi: "Divisi Acara",
                        anggota: [
                            { nama: "Syauqi", jabatan: "Koordinator" },
                            { nama: "Ananda", jabatan: "Anggota" }
                        ]
                    }
                ]
            }
        ];

        const monthNames = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];

        function formatTglRange(startStr, endStr) {
            if(!startStr) return "-";
            const s = new Date(startStr); const e = endStr ? new Date(endStr) : s;
            if(s.getTime() === e.getTime()) return `${s.getDate()} ${monthNames[s.getMonth()]} ${s.getFullYear()}`;
            if(s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear()) return `${s.getDate()} - ${e.getDate()} ${monthNames[s.getMonth()]} ${s.getFullYear()}`;
            return `${s.getDate()} ${monthNames[s.getMonth()]} - ${e.getDate()} ${monthNames[e.getMonth()]} ${s.getFullYear()}`;
        }

        function getAgendaStatus(startStr, endStr) {
            if(!startStr) return { text: "INFO", class: "badge-selesai", isBuka: false };
            const today = new Date(); today.setHours(0,0,0,0);
            const s = new Date(startStr); s.setHours(0,0,0,0);
            const e = endStr ? new Date(endStr) : s; e.setHours(0,0,0,0);
            
            if(today >= s && today <= e) return { text: "PROKER SEDANG BERLANGSUNG", class: "badge-berlangsung", isBuka: true };
            if(today < s) return { text: "PROKER SEGERA HADIR", class: "badge-segera", isBuka: true };
            return { text: "SELESAI DILAKSANAKAN", class: "badge-selesai", isBuka: false };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Ambil SLUG dari URL Path (Cth: /proker-detail/umi-amal-senyuman-uas-vol-iv)
            const pathParts = window.location.pathname.split('/');
            const slug = pathParts[pathParts.length - 1];
            let kalenderData = [];
            
            try {
                let apiUrl = '/api/content';
                if(window.location.protocol === 'blob:' || window.location.origin === "null") apiUrl = 'https://bemkbmfkgumi.com/api/content';
                
                const req = await fetch(apiUrl);
                if(!req.ok) throw new Error("Gagal mengambil data API");
                
                const res = await req.json();
                kalenderData = res.kalender || [];

            } catch (err) {
                // FIX ERROR FETCH (GBR 1): Jika API gagal dipanggil, gunakan fallback data lokal!
                console.warn("⚠️ Menggunakan data fallback lokal karena API tidak dapat dijangkau.");
                kalenderData = FALLBACK_KALENDER;
            }

            // Cari data berdasarkan ID slug
            const prokerData = kalenderData.find(p => p.id === slug || p.slug === slug);
            
            // Logika Pintar untuk Preview Canvas: Jika URL tidak spesifik menunjuk ke slug proker, render data pertama
            const isLocalPreview = window.location.protocol === 'blob:' || window.location.origin === "null" || slug === "proker-detail" || slug === "";
            const finalData = prokerData || (isLocalPreview ? kalenderData[0] : null);

            if(!finalData) {
                document.getElementById('mainContent').innerHTML = `
                    <div style="text-align:center; padding: 100px 0;">
                        <h2 style="font-size: 2rem; color: #ef4444; margin-bottom: 10px;">404 - Program Kerja Tidak Ditemukan</h2>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">Data kegiatan ini tidak tersedia di database atau telah dihapus.</p>
                        <a href="/informasi#kalender" class="holo-btn">Lihat Kalender Proker</a>
                    </div>
                `;
                return;
            }
            
            renderDetail(finalData);
        });

        function renderDetail(data) {
            const bgImg = data.banner || '/img/bemfkgumi.png';
            const wktPelaksanaan = formatTglRange(data.tglMulai, data.tglSelesai);
            const statusInfo = getAgendaStatus(data.tglMulai, data.tglSelesai);
            
            // Konversi new line menjadi tag <br> untuk deskripsi
            const descHtml = data.deskripsi ? data.deskripsi.replace(/\n/g, '<br>') : 'Belum ada deskripsi untuk kegiatan ini.';

            // Render Kepanitiaan
            let panitiaHtml = '';
            if(data.kepanitiaan && data.kepanitiaan.length > 0) {
                data.kepanitiaan.forEach(divisi => {
                    let anggotaRows = '';
                    if(divisi.anggota && divisi.anggota.length > 0) {
                        divisi.anggota.forEach(ang => {
                            anggotaRows += `
                                <tr>
                                    <td>${ang.nama}</td>
                                    <td>${ang.jabatan}</td>
                                </tr>
                            `;
                        });
                    } else {
                        anggotaRows = `<tr><td colspan="2" style="text-align:center; color:var(--text-muted);">Data anggota belum diinput</td></tr>`;
                    }

                    panitiaHtml += `
                        <div class="panitia-box">
                            <h4 class="panitia-title">${divisi.namaDivisi}</h4>
                            <table class="panitia-table">
                                <thead>
                                    <tr>
                                        <th>Nama Pengurus / Mahasiswa</th>
                                        <th style="text-align:right;">Jabatan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${anggotaRows}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            } else {
                panitiaHtml = `<div style="text-align:center; padding:30px; color:var(--text-muted); background:var(--bg-dark-overlay); border-radius:15px;">Struktur kepanitiaan belum dipublikasikan.</div>`;
            }

            // Render Tombol Pendaftaran
            let daftarHtml = '';
            if (statusInfo.isBuka && data.statusDaftar && data.statusDaftar.toLowerCase() === 'buka' && data.linkDaftar) {
                daftarHtml = `
                    <div style="margin-top: 30px; border-top: 1px solid var(--border-light); padding-top: 25px;">
                        <a href="${data.linkDaftar}" target="_blank" rel="noopener noreferrer" class="active-daftar">📝 Daftar Sebagai Peserta / Relawan</a>
                    </div>
                `;
            } else if (statusInfo.isBuka) {
                 daftarHtml = `
                    <div style="margin-top: 30px; border-top: 1px solid var(--border-light); padding-top: 25px;">
                        <div style="text-align:center; padding:15px; background:var(--bg-dark-overlay); border:1px solid var(--border-light); border-radius:12px; color:var(--text-muted); font-size:0.95rem;">
                            Pendaftaran belum dibuka atau tidak diperlukan link eksternal.
                        </div>
                    </div>
                `;
            } else {
                daftarHtml = `
                    <div style="margin-top: 30px; border-top: 1px solid var(--border-light); padding-top: 25px;">
                        <div style="text-align:center; padding:15px; background:rgba(239, 68, 68, 0.1); border:1px solid rgba(239, 68, 68, 0.2); border-radius:12px; color:#ef4444; font-size:0.95rem; font-weight:bold;">
                            🚫 Kegiatan Telah Selesai. Pendaftaran Ditutup.
                        </div>
                    </div>
                `;
            }

            // Inject to HTML
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- BAGIAN BANNER -->
                <div class="proker-banner-wrapper reveal active">
                    <img src="${bgImg}" alt="Banner ${data.nama}" class="proker-banner-img" width="1920" height="1080" fetchpriority="high">
                    <div class="proker-banner-overlay">
                        <div class="clay-badge" style="margin-bottom: 15px; font-size:0.75rem;">${data.dept || 'KBMFKG UMI'}</div>
                        <h1 style="font-size: 3rem; font-weight: 900; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 5px;">${data.nama}</h1>
                    </div>
                </div>

                <div class="grid-2" style="margin-bottom: 40px; grid-template-columns: 1fr 400px; gap: 40px;">
                    <!-- BAGIAN KIRI: DESKRIPSI DAN KEPANITIAAN -->
                    <div class="reveal active" style="transition-delay: 0.1s;">
                        <div class="glass-card" style="margin-bottom: 30px;">
                            <h2 class="detail-section-title">Deskripsi Kegiatan</h2>
                            <p style="color: var(--text-light); line-height: 1.8; font-size: 1.05rem;">${descHtml}</p>
                        </div>

                        <div class="glass-card">
                            <h2 class="detail-section-title" style="border-left-color: #f59e0b;">Struktur Kepanitiaan</h2>
                            ${panitiaHtml}
                        </div>
                    </div>

                    <!-- BAGIAN KANAN: METADATA & PENDAFTARAN -->
                    <div class="reveal active" style="transition-delay: 0.2s;">
                        <div class="glass-card" style="position: sticky; top: 120px;">
                            <h2 class="detail-section-title" style="border-left-color: #10b981; font-size: 1.4rem;">Informasi Pelaksanaan</h2>
                            
                            <div class="info-row">
                                <div class="info-icon-wrapper ic-lokasi" aria-hidden="true">📍</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600;">Lokasi Kegiatan</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.lokasi || 'Kondisional'}</strong>
                                </div>
                            </div>
                            
                            <div class="info-row">
                                <div class="info-icon-wrapper ic-waktu" aria-hidden="true">⏱️</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600;">Waktu Pelaksanaan</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${wktPelaksanaan}</strong>
                                </div>
                            </div>

                            <div class="info-row">
                                <div class="info-icon-wrapper ic-target" aria-hidden="true">🎯</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600;">Target Peserta</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.targetPeserta || 'Umum'}</strong>
                                </div>
                            </div>

                            ${daftarHtml}
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 50px;">
                    <a href="/informasi#kalender" class="glass-btn">← Kembali ke Kalender Proker</a>
                </div>
            `;
        }
    </script>
</body>
</html>
