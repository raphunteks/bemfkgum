    <!-- CSS ISOLATED FOR PROKER DESCRIPTION LAYOUT -->
    <style>
        .proker-banner-wrapper {
            border-radius: 25px; 
            box-shadow: 0 20px 50px var(--card-shadow); 
            overflow: hidden; 
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
        }
        .proker-banner-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .proker-banner-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(11, 19, 43, 0.8) 60%, transparent 100%);
            padding: 80px 40px 40px;
        }
        .detail-section-title {
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 25px;
            padding-left: 18px;
            border-left: 5px solid var(--accent-neon);
            font-weight: 800;
        }
        .fungsi-list li {
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.8;
        }
        
        /* Glassmorphism Team Card Styling */
        .dept-team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .dept-member-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px var(--card-shadow);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .dept-member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px var(--accent-glow);
            border-color: var(--accent-neon);
        }
        .dept-member-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-dark);
            box-shadow: 0 0 0 2px var(--accent-neon);
            margin-bottom: 15px;
        }
        .dept-member-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .dept-member-role {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Utility Component */
        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-dark-heavy);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
        }

        @media(max-width: 900px) {
            .grid-2 { grid-template-columns: 1fr !important; }
            .proker-banner-img { height: 300px; }
            .proker-banner-overlay { padding: 40px 20px 20px; }
        }
    </style>
</head>
<body>
    <%- include('partials/header.html') %>

    <main class="container" style="padding-top: 30px; min-height: 70vh; padding-bottom: 80px;" id="mainContent">
        <!-- Area Loading Animasi CSS Murni -->
        <div style="text-align:center; padding: 100px 0;">
            <div style="width: 40px; height: 40px; border: 4px solid var(--accent-neon); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;" aria-hidden="true"></div>
            <span style="color: var(--text-muted);" aria-live="polite">Mencari Data Departemen di Server...</span>
        </div>
    </main>

    <%- include('partials/footer.html') %>

    <script>
        // Data Fallback (Mencegah Error di Preview Canvas / Saat API Mati)
        const FALLBACK_PROKER_DATA = {
            id: "pubmed",
            dept: "DEPT. INFOCOM",
            namaProker: "PUBMED",
            bgImage: "/img/bemfkgumi.png",
            fotoPengurus: "/img/bemfkgumi.png",
            shortDesc: "Membuat konten-konten menarik yang memuat tentang informasi (berita, pemberitahuan, peringatan hari besar, isu-isu yang berkembang)",
            sasaranPeserta: "Ruang lingkup internal hingga eksternal FKG-UMI.",
            targetPelaksanaan: "Triwulan I",
            startDate: "2026-01-01",
            endDate: "2026-12-31",
            performer: "Pengurus Dept. Infocom",
            anggaran: "Rp. 7.000.000,-",
            koordinator: "Silviyananda",
            penanggungJawab: "Silvy Ananda, Muh. Syauqi Zahran. B, Daegal Fauza Iryanto",
            latarBelakang: "Memasuki Era Revolusi Industri 5.0 yang lebih menitik beratkan pada pengembangan teknologi...",
            tujuan: "Memberikan kemudahan akses informasi yang cepat dan akurat...",
            swot: "Strength: Tim yang solid dan melek teknologi...\nWeakness: Keterbatasan alat dokumentasi...",
            parameterKeberhasilan: "Semua media informasi (platform digital & cetak) dapat memberikan konten..."
        };

        const FALLBACK_ORG_DEPARTEMEN = [
            {
                nama: "DEPT. INFOCOM",
                anggota: [
                    {jabatan: "Koordinator", nama: "Silviyananda", foto: "/img/bemfkgumi.png"},
                    {jabatan: "Anggota", nama: "Muh. Syauqi Zahran. B", foto: "/img/bemfkgumi.png"},
                    {jabatan: "Anggota", nama: "Daegal Fauza Iryanto", foto: "/img/bemfkgumi.png"},
                    {jabatan: "Anggota", nama: "Zahwa Alzahra", foto: "/img/bemfkgumi.png"},
                    {jabatan: "Anggota", nama: "Zaneta Zahra Zulaikha", foto: "/img/bemfkgumi.png"},
                    {jabatan: "Anggota", nama: "Novita Widyantari", foto: "/img/bemfkgumi.png"}
                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            const isPreview = window.location.protocol === 'blob:' || window.location.origin === "null";
            let apiUrl = isPreview ? 'https://bemkbmfkgumi.com/api/content' : '/api/content';
            
            // Ambil SLUG dari URL Path (Cth: /proker-deskripsi/pubmed) atau query parameter di preview
            const urlParams = new URLSearchParams(window.location.search);
            const pathParts = window.location.pathname.split('/');
            let slug = pathParts[pathParts.length - 1];
            
            if(!slug || slug === 'proker-deskripsi' || isPreview) {
                slug = urlParams.get('id') || 'pubmed'; // Fallback aman untuk preview
            }

            let deptData = null;
            let allOrgDept = [];
            
            try {
                // Mencoba mengambil data dari Database Server
                const req = await fetch(apiUrl);
                if(!req.ok) throw new Error("Gagal mengambil data dari Database API");
                
                const res = await req.json();
                const allProker = res.proker || [];
                allOrgDept = (res.org || {}).departemen || [];
                
                // Pencarian data spesifik berdasarkan SLUG
                deptData = allProker.find(p => p.id === slug);
                
                // Jika data tidak ditemukan dan sedang di preview, paksakan fallback
                if(!deptData && isPreview) {
                    throw new Error("Preview Mode: Fallback diaktifkan.");
                } else if(!deptData) {
                    showErrorState("404 - Departemen Tidak Ditemukan", "Data departemen atau program kerja tidak tersedia di database. Kemungkinan tautan salah atau data telah dihapus.");
                    return;
                }

            } catch (err) {
                console.warn("[FETCH/PREVIEW MODE]: Menggunakan data lokal (Fallback).", err.message);
                // Graceful Degradation: Pastikan aplikasi tidak rusak / error merah di Console
                deptData = FALLBACK_PROKER_DATA;
                allOrgDept = FALLBACK_ORG_DEPARTEMEN;
                slug = FALLBACK_PROKER_DATA.id;
            }

            // =========================================================
            // SUPER UPGRADE SEO DYNAMIC INJECTION (OPEN GRAPH & JSON-LD)
            // =========================================================
            const pageTitle = `${deptData.dept} - Department Profile | BEM KBMFKG UMI`;
            document.title = pageTitle;
            
            const descText = deptData.shortDesc ? (deptData.shortDesc.substring(0, 155) + '...') : `Informasi detail mengenai program kerja dan struktur kepengurusan dari ${deptData.dept} BEM KBMFKG UMI.`;
            const pageUrl = `https://bemkbmfkgumi.com/proker-deskripsi/${slug}`;
            const imgUrl = deptData.bgImage ? (deptData.bgImage.startsWith('http') ? deptData.bgImage : `https://bemkbmfkgumi.com${deptData.bgImage}`) : 'https://bemkbmfkgumi.com/img/bemfkgumi.png';

            document.querySelector('meta[name="description"]')?.setAttribute('content', descText);
            document.querySelector('link[rel="canonical"]')?.setAttribute('href', pageUrl);
            
            document.querySelector('meta[property="og:title"]')?.setAttribute('content', pageTitle);
            document.querySelector('meta[property="og:description"]')?.setAttribute('content', descText);
            document.querySelector('meta[property="og:url"]')?.setAttribute('content', pageUrl);
            document.querySelector('meta[property="og:image"]')?.setAttribute('content', imgUrl);
            
            document.querySelector('meta[property="twitter:title"]')?.setAttribute('content', pageTitle);
            document.querySelector('meta[property="twitter:description"]')?.setAttribute('content', descText);
            document.querySelector('meta[property="twitter:url"]')?.setAttribute('content', pageUrl);
            document.querySelector('meta[property="twitter:image"]')?.setAttribute('content', imgUrl);

            const schemaScript = document.getElementById('structuredData');
            if (schemaScript) {
                const schema = JSON.parse(schemaScript.innerHTML);
                
                // Update Dynamic AboutPage Schema
                const aboutSchema = schema["@graph"].find(item => item["@type"] === "AboutPage");
                if (aboutSchema) {
                    aboutSchema.name = `${deptData.dept} - Department Profile`;
                    aboutSchema.description = descText;
                    aboutSchema.url = pageUrl;
                }

                // Update Dynamic EVENT Schema (Anti Error Google GSC)
                const eventSchema = schema["@graph"].find(item => item["@type"] === "Event");
                if (eventSchema) {
                    eventSchema.name = `${deptData.dept} - Work Programs`;
                    eventSchema.description = descText;
                    eventSchema.url = pageUrl;
                    
                    // Inject Dynamic Dates ISO 8601
                    eventSchema.startDate = deptData.startDate ? deptData.startDate + "T08:00:00+08:00" : new Date().toISOString();
                    eventSchema.endDate = deptData.endDate ? deptData.endDate + "T17:00:00+08:00" : eventSchema.startDate;
                    
                    eventSchema.location = { 
                        "@type": "Place", 
                        "name": deptData.sasaranPeserta || "Universitas Muslim Indonesia", 
                        "address": deptData.sasaranPeserta || "Makassar, Sulawesi Selatan" 
                    };

                    eventSchema.performer = {
                        "@type": "Organization",
                        "name": deptData.performer || deptData.dept || "BEM KBMFKG UMI"
                    };

                    let priceValue = "0";
                    if (deptData.anggaran && deptData.anggaran.toLowerCase() !== 'gratis') {
                        priceValue = deptData.anggaran.replace(/[^0-9]/g, '') || "0";
                    }
                    eventSchema.offers = {
                        "@type": "Offer",
                        "price": priceValue,
                        "priceCurrency": "IDR",
                        "url": pageUrl,
                        "availability": "https://schema.org/InStock"
                    };
                    
                    if(deptData.bgImage) eventSchema.image = imgUrl;
                }

                // Update Dynamic Breadcrumb
                const breadcrumbSchema = schema["@graph"].find(item => item["@type"] === "BreadcrumbList");
                if (breadcrumbSchema && breadcrumbSchema.itemListElement[2]) {
                    breadcrumbSchema.itemListElement[2].name = deptData.dept;
                    breadcrumbSchema.itemListElement[2].item = pageUrl;
                }

                schemaScript.innerHTML = JSON.stringify(schema);
            }
            // ==================== END SEO DYNAMIC ====================
            
            // Render UI Terakhir
            renderDetail(deptData, allOrgDept);
        });

        // ================= FUNGSI RENDER ERROR STATE =================
        function showErrorState(title, message) {
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center; padding: 100px 0; animation: fadeInTab 0.5s ease;">
                    <h2 style="font-size: 2.2rem; color: #ef4444; margin-bottom: 10px;">${title}</h2>
                    <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px;">${message}</p>
                    <a href="/informasi#proker" class="holo-btn">Kembali ke Pusat Informasi</a>
                </div>
            `;
        }

        // Fungsi Convert Tanggal (YYYY-MM-DD ke DD-MM-YYYY)
        function formatDateToDDMMYYYY(dateString) {
            if (!dateString) return '-';
            const parts = dateString.split('-');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateString;
        }

        // ================= FUNGSI RENDER UTAMA UI GLASSMORPHISM =================
        function renderDetail(data, orgDepartemen) {
            const bgImg = data.bgImage || '/img/bemfkgumi.png';

            // Generate Struktur Pengurus Card UI
            let strukturHtml = '';
            let deptStructure = null;
            if(orgDepartemen && orgDepartemen.length > 0) {
               deptStructure = orgDepartemen.find(d => d.nama === data.dept);
            }

            if (deptStructure && deptStructure.anggota && deptStructure.anggota.length > 0) {
                strukturHtml = `<div class="dept-team-grid">`;
                deptStructure.anggota.forEach(ang => {
                    const angPic = ang.foto || '/img/bemfkgumi.png';
                    strukturHtml += `
                        <div class="dept-member-card">
                            <img src="${angPic}" alt="${ang.nama}" class="dept-member-photo" loading="lazy" width="80" height="80">
                            <h4 class="dept-member-name">${ang.nama}</h4>
                            <p class="dept-member-role">${ang.jabatan}</p>
                        </div>
                    `;
                });
                strukturHtml += `</div>`;
            } else {
                // Tampilan text fallback jika data foto tidak tersedia di Manajemen Profil
                strukturHtml = `
                    <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-light);">
                        <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600;">Koordinator Departemen</span>
                        <strong style="color: var(--accent-neon); font-size: 1.2rem;">${data.koordinator || '-'}</strong>
                    </div>
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600;">Anggota / Penanggung Jawab Proker</span>
                        <p style="color: var(--text-muted); line-height: 1.8; font-weight: 500;">
                            ${data.penanggungJawab ? data.penanggungJawab.replace(/,/g, '<br>• ') : '-'}
                        </p>
                    </div>
                `;
            }

            // SUPER UPGRADE: Menyusun Judul Banner (Menggabungkan Nama Dept dan Nama Proker)
            // Memastikan penamaan otomatis menjadi HURUF KAPITAL (UPPERCASE)
            const deptText = data.dept ? data.dept.toUpperCase() : '';
            const prokerText = data.namaProker ? data.namaProker.toUpperCase() : '';
            const titleBanner = prokerText ? `${deptText} - ${prokerText}` : deptText;

            // SUPER UPGRADE: Format Tanggal ke DD-MM-YYYY
            const formattedStart = formatDateToDDMMYYYY(data.startDate);
            const formattedEnd = formatDateToDDMMYYYY(data.endDate);

            // Inject Konten Keseluruhan ke DOM
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- BAGIAN BANNER 1920x1080 (LCP OPTIMIZED) - DIKEMBALIKAN KE STYLE ELEGAN SEPERTI GAMBAR 2 -->
                <div class="proker-banner-wrapper reveal active">
                    <img src="${bgImg}" alt="Banner ${data.dept}" class="proker-banner-img" width="1920" height="1080" fetchpriority="high">
                    
                    <!-- Gradient Overlay at bottom for title -->
                    <div class="proker-banner-overlay" style="z-index: 2;">
                        <div class="clay-badge" style="margin-bottom: 15px; font-size:0.75rem; background: rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2);">DESKRIPSI PROGRAM KERJA</div>
                        <h2 style="font-size: 3rem; font-weight: 900; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 5px; text-transform: uppercase;">${titleBanner}</h2>
                        <p style="color: rgba(255,255,255,0.85); font-size: 1.1rem; max-width: 800px; margin-top: 10px; line-height: 1.6;">${data.shortDesc || ''}</p>
                    </div>
                </div>

                <div class="grid-2" style="margin-bottom: 40px; grid-template-columns: 1fr 380px; gap: 40px;">
                    <!-- BAGIAN KIRI: 4 DESKRIPSI LENGKAP -->
                    <div class="glass-card reveal active" style="transition-delay: 0.1s;">
                        <h2 class="detail-section-title">Latar Belakang / Bentuk Kegiatan</h2>
                        <p style="color:var(--text-muted); line-height:1.8; font-size:1.05rem; margin-bottom:30px; white-space: pre-wrap;">${data.latarBelakang || '-'}</p>

                        <h2 class="detail-section-title">Tujuan Kegiatan</h2>
                        <p style="color:var(--text-muted); line-height:1.8; font-size:1.05rem; margin-bottom:30px; white-space: pre-wrap;">${data.tujuan || '-'}</p>

                        <h2 class="detail-section-title">Analisis SWOT</h2>
                        <p style="color:var(--text-muted); line-height:1.8; font-size:1.05rem; margin-bottom:30px; white-space: pre-wrap;">${data.swot || '-'}</p>

                        <h2 class="detail-section-title" style="margin-bottom: 15px;">Parameter Keberhasilan</h2>
                        <p style="color:var(--text-muted); line-height:1.8; font-size:1.05rem; margin-bottom:10px; white-space: pre-wrap;">${data.parameterKeberhasilan || '-'}</p>
                    </div>

                    <!-- BAGIAN KANAN: METADATA & PENANGGUNG JAWAB -->
                    <div class="reveal active" style="transition-delay: 0.2s;">
                        <div class="glass-card" style="margin-bottom: 30px; padding: 25px; position: sticky; top: 100px;">

                            <div class="info-row">
                                <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; color: #ef4444; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2);" aria-hidden="true">🎯</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; font-weight: 600;">Sasaran Peserta</span>

                                </div>
                            </div>
                            
                            <div class="info-row">
                                <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; color: var(--accent-neon); background: var(--bg-dark-overlay); border: 1px solid var(--accent-glow);" aria-hidden="true">⏱️</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; font-weight: 600;">Target Pelaksanaan</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.targetPelaksanaan || 'Sepanjang Periode'}</strong>
                                </div>
                            </div>

                            <div class="info-row">
                                <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; color: #a855f7; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2);" aria-hidden="true">📅</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; font-weight: 600;">Periode Tanggal</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${formattedStart} s/d ${formattedEnd}</strong>
                                </div>
                            </div>

                            <div class="info-row">
                                <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; color: #eab308; background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2);" aria-hidden="true">💰</div>
                                <div>
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; font-weight: 600;">Rancangan Anggaran Dana</span>
                                    <strong style="color: var(--text-light); font-size: 1.05rem;">${data.anggaran || 'Rp. 0,-'}</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KOTAK STRUKTUR PENGURUS BARU (FULL WIDTH DI BAWAH) -->
                <div class="glass-card reveal active" style="padding: 35px; margin-bottom: 30px; transition-delay: 0.3s;">
                     <h2 class="detail-section-title" style="border-left-color: #8b5cf6;">Struktur Pengurus Departemen</h2>
                     <p style="color: var(--text-muted); margin-bottom: 25px;">Para punggawa penggerak program kerja di departemen ini.</p>
                     ${strukturHtml}
                </div>
                
                <div style="text-align: center; margin-top: 50px;">
                    <a href="/informasi#proker" class="glass-btn">&larr; Kembali ke Pusat Informasi</a>
                </div>
            `;
        }
    </script>
</body>
